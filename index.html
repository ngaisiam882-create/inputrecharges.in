<!DOCTYPE html>
<html>
<head>
<title>Game Recharge</title>
<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:40px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:200px;
}
button{
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:5px;
}
</style>
</head>

<body>

<h1>Game Recharge Center</h1>

<div class="container">

<div class="card">
<h2>MLBB</h2>
<p>Recharge Diamonds</p>
<button>Buy Now</button>
</div>

<div class="card">
<h2>BGMI</h2>
<p>Recharge UC</p>
<button>Buy Now</button>
</div>

<div class="card">
<h2>HOK</h2>
<p>Recharge Tokens</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
